<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threads Unmask</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <div class="hero-main">
          <img class="logo" src="images/icon_128px.png" data-i18n-alt="logoAlt" alt="Threads Unmask logo" />
          <div>
            <p class="eyebrow" data-i18n-eyebrow>Threads Unmask</p>
            <h1 data-i18n="headingPopup">防劇透設定</h1>
          </div>
        </div>
        <button id="open-options" class="icon-button" type="button" data-i18n-aria-label="openSettings" aria-label="開啟設定頁" title="開啟設定頁">
          <img src="images/settings_24dp.svg" alt="" />
        </button>
      </header>
      <label class="setting">
        <input id="remove-text-spoilers" type="checkbox" />
        <span>
          <strong data-i18n="textLabel">移除文字防劇透</strong>
          <small data-i18n-text-help>在 Threads 自動顯示被遮住的文字。</small>
        </span>
      </label>

      <label class="setting">
        <input id="remove-image-spoilers" type="checkbox" />
        <span>
          <strong data-i18n="imageLabel">移除圖片防劇透</strong>
          <small data-i18n-image-help>自動點開或移除劇透圖片外層遮罩。</small>
        </span>
      </label>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="lib/spoiler-helpers.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
